name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip discord.py

      - name: Compile Python sources
        run: python -m compileall main.py ai cogs tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
